# Render Blueprint for JavaAPI deployment
# This file configures automatic deployment on Render

services:
  - type: web
    name: javaapi
    env: docker
    plan: free  # Change to 'starter' or higher for production
    region: oregon  # Choose: oregon, frankfurt, ohio, singapore
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    healthCheckPath: /
    autoDeploy: true
